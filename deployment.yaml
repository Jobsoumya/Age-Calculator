apiVersion: apps/v1
kind: Deployment
metadata:
  name: age-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: age-calculator
  template:
    metadata:
      labels:
        app: age-calculator
    spec:
      containers:
      - name: age-calculator
        image: ghcr.io/jobsoumya/age-calculator:latest
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: age-calculator-service
spec:
  type: NodePort
  selector:
    app: age-app
  ports:
  - port: 80
    targetPort: 80
